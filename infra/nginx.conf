events {}

http {
    server {
        listen 80;

        server_name cloudpilot.13.60.57.168.sslip.io;

        # Frontend (React/Vite)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backend API  ✅ FIXED
        location /api/ {
            proxy_pass http://backend:8000;   # ❗ REMOVED trailing /
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}