events {}

http {
    # HTTP (port 80)
    server {
        listen 80;
        server_name cloudpilot.13.60.57.168.sslip.io;

        # TEMP: keep HTTP working (no redirect yet)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # HTTPS (port 443)
    server {
        listen 443 ssl;
        server_name cloudpilot.13.60.57.168.sslip.io;

        ssl_certificate /etc/letsencrypt/live/cloudpilot.13.60.57.168.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cloudpilot.13.60.57.168.sslip.io/privkey.pem;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}