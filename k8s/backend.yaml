apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cloudpilot
data:
  APP_NAME: CloudPilot Backend
  ENVIRONMENT: production
  API_PREFIX: /api
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/appdb
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGINS: '["http://localhost", "http://localhost:3000", "http://127.0.0.1:3000", "http://localhost:30007"]'
  COOKIE_SECURE: "false"
  COOKIE_SAMESITE: lax
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_MINUTES: "10080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cloudpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: cloudpilot
    spec:
      containers:
        - name: backend
          image: cloudpilot-backend:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: SECRET_KEY
              value: change-me-in-cluster
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: cloudpilot
spec:
  selector:
    app: backend
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
